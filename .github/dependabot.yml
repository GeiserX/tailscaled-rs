version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: deps
    open-pull-requests-limit: 10
    groups:
      cargo-security:
        applies-to: security-updates
        patterns:
          - '*'
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    commit-message:
      prefix: ci
    labels:
      - ci
      - automated
    groups:
      github-actions:
        patterns:
          - '*'
      github_actions_security:
        applies-to: security-updates
        patterns:
          - '*'
