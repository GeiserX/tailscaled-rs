# Release automation: commit-type-driven version bumps via release-please.
#
# This is the *versioning* half of the release pipeline; `release.yml` is the
# *binary-building* half. They are intentionally separate and chain through a tag:
#
#   1. Commits land on `main` using Conventional Commits (feat:, fix:, …).
#   2. release-please reads every commit since the last release and maintains a
#      standing "release PR" that bumps `version` in Cargo.toml and rewrites the
#      `[Unreleased]` section of CHANGELOG.md into a dated, versioned entry.
#   3. When a human merges that release PR, release-please creates the GitHub
#      Release and pushes the tag `v{version}` (e.g. `v0.2.0`).
#   4. That `v*` tag push is exactly the trigger `release.yml` listens for, so the
#      cross-compiled `tailnetd`/`tnet` binaries are built and attached to the
#      Release that release-please just opened.  release-please never builds
#      binaries; release.yml never decides versions — no overlap.
#
# Pre-1.0 semantics (the project is 0.x): with `release-type: rust`, release-please's
# default pre-major behavior matches CHANGELOG.md's stated policy —
#   feat:     → minor (0.MINOR.0)
#   fix:      → patch (0.x.PATCH)
#   breaking  → minor while < 1.0 (NOT a major bump), surfaced under "Changed"
# so no extra config is needed to honor "breaking changes may land in a minor".
#
# Tag format: release.yml triggers on the `v*` glob, so the tag MUST be `v{version}`
# (e.g. `v0.2.0`) with no component prefix. Two config keys together produce that:
#   include-v-in-tag: true          → prepend the `v`
#   include-component-in-tag: false → DROP the `tailscaled-rs-` package prefix
# Both live in release-please-config.json. The second is load-bearing and easy to
# miss: in manifest mode `include-component-in-tag` DEFAULTS TO TRUE, which emits
# `tailscaled-rs-v{version}` — that does NOT match `v*`, so release.yml never fires
# and the GitHub Release ships with no binaries. Do not change the glob or either
# key without the others, or the tag → binaries chain silently breaks.

name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# release-please needs to open/maintain the release PR and, on merge, create the
# release + tag. `actions: write` lets the post-release step dispatch release.yml
# (the GITHUB_TOKEN recursion guard means the tag push alone won't trigger it).
permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  release-please:
    name: maintain release PR · cut release on merge
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          # Manifest-driven config (the v4 action's preferred mode): the source of
          # truth is release-please-config.json + .release-please-manifest.json at
          # the repo root, which set release-type=rust and the current version.
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Kick off the binary build (release.yml) when a release was just cut.
      #
      # Why we can't rely on release.yml's own `on: push: tags: ['v*']`: the tag is
      # pushed by release-please using the workflow's GITHUB_TOKEN, and GitHub
      # deliberately does NOT trigger further workflow runs from events made with
      # GITHUB_TOKEN (recursion guard). So a release-please tag push lands silently
      # and release.yml never fires — the Release ships with no binaries. Explicitly
      # dispatching it here closes that gap without needing a PAT. (release.yml keeps
      # its tag/dispatch triggers for manual re-runs.)
      - name: Dispatch binary build for the new tag
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag_name }}
        run: gh workflow run release.yml --repo "${GITHUB_REPOSITORY}" --ref "${TAG}"
