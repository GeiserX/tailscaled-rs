name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # The engine requires this acknowledgement even to link against it in some paths.
  TS_RS_EXPERIMENT: this_is_unstable_software

jobs:
  test:
    name: fmt · clippy · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      # The `tun` feature is off by default (it pulls the privileged kernel-TUN
      # transport). Lint + build it explicitly so the cfg(feature = "tun")-gated
      # code can't silently rot — it isn't covered by the default-config steps above.
      - name: Clippy (tun feature)
        run: cargo clippy --all-targets --features tun -- -D warnings

      - name: Test
        run: cargo test --all-targets

      - name: Build release
        run: cargo build --release --bins

      - name: Build release (tun feature)
        run: cargo build --release --bins --features tun

  coverage:
    name: coverage (codecov)
    runs-on: ubuntu-latest
    # Separate job: does NOT gate the `test` job above. The Codecov check is
    # informational (see codecov.yml) — 90% is the TARGET, not yet met, so a
    # below-threshold result here must not turn CI red while coverage is built up.
    # TS_RS_EXPERIMENT is inherited from the workflow-level `env:` block above.
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # Runs `cargo test` under instrumentation. `#[ignore]`d tests (e.g.
      # headscale_e2e, which needs network) are skipped by default — we do NOT
      # pass `--ignored`, so they never run under coverage.
      - name: Generate coverage (lcov)
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          # Public repo: upload works tokenless. Token is optional and only used
          # if the secret is set; absence does not fail the upload for public repos.
          token: ${{ secrets.CODECOV_TOKEN }}
          # A Codecov flake must not gate the build.
          fail_ci_if_error: false
