name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # The engine requires this acknowledgement even to link against it in some paths.
  TS_RS_EXPERIMENT: this_is_unstable_software

jobs:
  test:
    name: fmt · clippy · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      # The `tun` feature is off by default (it pulls the privileged kernel-TUN
      # transport). Lint + build it explicitly so the cfg(feature = "tun")-gated
      # code can't silently rot — it isn't covered by the default-config steps above.
      - name: Clippy (tun feature)
        run: cargo clippy --all-targets --features tun -- -D warnings

      # The `ssh` feature is off by default (it pulls the russh-based Tailscale SSH
      # server — a remote-shell surface). Lint + test + build it explicitly: this is
      # security-sensitive code, so the primary gate must cover it, not just the
      # `coverage` job's `--all-features` run.
      - name: Clippy (ssh feature)
        run: cargo clippy --all-targets --features ssh -- -D warnings

      # The `acme` feature is off by default (it pulls the engine's ACME cert-issuance path for
      # `tnet cert`). Lint it explicitly so the cfg(feature = "acme")-gated code can't silently rot —
      # the default-config steps only compile the non-acme fail-closed branch.
      - name: Clippy (acme feature)
        run: cargo clippy --all-targets --features acme -- -D warnings

      # The `identity-federation` feature is off by default (it pulls the engine's OAuth/OIDC
      # auth-key exchange for `tnet up --client-id/--client-secret/--id-token/--audience`). Lint + test
      # it explicitly so the cfg(feature = "identity-federation")-gated WIF code can't silently rot —
      # the default-config steps only compile the non-feature branch (where the daemon refuses the
      # flags). Security-sensitive (credential handling), so the gating job must cover it directly.
      - name: Clippy (identity-federation feature)
        run: cargo clippy --all-targets --features identity-federation -- -D warnings

      - name: Test
        run: cargo test --all-targets

      - name: Test (ssh feature)
        run: cargo test --all-targets --features ssh

      - name: Test (identity-federation feature)
        run: cargo test --all-targets --features identity-federation

      # Reclaim disk before the release builds. The debug-profile test artifacts above accumulate a
      # separate compiled set per feature config (default / ssh / identity-federation), each pulling a
      # full engine rebuild — on the disk-constrained self-hosted runner (shared with the engine lane)
      # this peak has intermittently hit `No space left on device` during the last feature test (a
      # transient that clears on re-run, but costs a re-run). The release builds below use a distinct
      # `target/release` profile and need none of the `target/debug` artifacts, so dropping the dev
      # profile here bounds peak usage with no loss of coverage. `rust-cache` (above) saves its cache
      # from an earlier point in the job, so this does not defeat cross-run caching.
      - name: Reclaim disk (drop debug artifacts before release builds)
        run: cargo clean --profile dev

      - name: Build release
        run: cargo build --release --bins

      - name: Build release (tun feature)
        run: cargo build --release --bins --features tun

      - name: Build release (ssh feature)
        run: cargo build --release --bins --features ssh

  coverage:
    name: coverage (codecov)
    runs-on: ubuntu-latest
    # Separate job: does NOT gate the `test` job above. The Codecov check is
    # informational (see codecov.yml) — 90% is the TARGET, not yet met, so a
    # below-threshold result here must not turn CI red while coverage is built up.
    # TS_RS_EXPERIMENT is inherited from the workflow-level `env:` block above.
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # Runs `cargo test` under instrumentation. `#[ignore]`d tests (e.g.
      # headscale_e2e, which needs network) are skipped by default — we do NOT
      # pass `--ignored`, so they never run under coverage.
      - name: Generate coverage (lcov)
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          # Public repo: upload works tokenless. Token is optional and only used
          # if the secret is set; absence does not fail the upload for public repos.
          token: ${{ secrets.CODECOV_TOKEN }}
          # A Codecov flake must not gate the build.
          fail_ci_if_error: false
