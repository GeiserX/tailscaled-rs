<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5E5CE6"/>
      <stop offset="100%" stop-color="#0D1B2A"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <rect width="900" height="200" rx="12" fill="url(#bg)"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="50" x2="900" y2="50"/><line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="150" x2="900" y2="150"/><line x1="150" y1="0" x2="150" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/><line x1="450" y1="0" x2="450" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/><line x1="750" y1="0" x2="750" y2="200"/>
  </g>

  <!-- Mesh-node icon: a hub connected to peers -->
  <g transform="translate(70, 60)">
    <circle cx="40" cy="40" r="38" fill="url(#glow)" stroke="#ffffff" stroke-width="2" opacity="0.9"/>
    <!-- spokes -->
    <g stroke="#ffffff" stroke-width="2" opacity="0.55">
      <line x1="40" y1="40" x2="40" y2="6"/>
      <line x1="40" y1="40" x2="70" y2="58"/>
      <line x1="40" y1="40" x2="12" y2="60"/>
    </g>
    <!-- peer nodes -->
    <circle cx="40" cy="6"  r="5" fill="#ffffff" opacity="0.85"/>
    <circle cx="70" cy="58" r="5" fill="#ffffff" opacity="0.85"/>
    <circle cx="12" cy="60" r="5" fill="#ffffff" opacity="0.85"/>
    <!-- hub -->
    <circle cx="40" cy="40" r="9" fill="#ffffff"/>
  </g>

  <text x="195" y="92" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="-1">
    tailscaled-rs
  </text>

  <text x="197" y="128" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#ffffff" opacity="0.65" letter-spacing="0.3">
    A from-scratch mesh-VPN node daemon in Rust
  </text>

  <g transform="translate(735, 50)" opacity="0.16">
    <text x="0" y="0"  font-family="monospace" font-size="11" fill="#ffffff">$ tnet up</text>
    <text x="0" y="16" font-family="monospace" font-size="11" fill="#ffffff">$ tnet status</text>
    <text x="0" y="32" font-family="monospace" font-size="11" fill="#ffffff">state: Running</text>
    <text x="0" y="48" font-family="monospace" font-size="11" fill="#ffffff">100.70.22.12</text>
    <text x="0" y="64" font-family="monospace" font-size="11" fill="#ffffff">peers: 17</text>
  </g>
</svg>
