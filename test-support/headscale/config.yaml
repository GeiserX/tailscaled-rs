# Minimal Headscale config for ToS-clean local e2e testing of the tailscaled-rs daemon.
#
# This is the SMALLEST config that boots a usable single-tailnet control server — not a
# production config. It is loaded by the headscale container in this directory's
# docker-compose.yml (mounted read-only at /etc/headscale/config.yaml). See ../../docs/TESTING.md
# for the full local loop (create a user + pre-auth key, then point the daemon at this server).
#
# Schema tracks the `config-example.yaml` shipped with the pinned headscale image
# (headscale/headscale:0.28.0). Keys removed from that example here are simply left at their
# headscale defaults; everything below is the minimum needed to register a node and serve a netmap.

# Clients connect here; must match the host port published by docker-compose. The daemon is pointed
# at this same URL via `tnet up --control-url http://localhost:8080` (or TS_CONTROL_URL / the
# TAILNETD_HS_URL env the gated integration test reads).
server_url: http://localhost:8080

# Bind on all interfaces inside the container so the published port reaches it.
listen_addr: 0.0.0.0:8080
metrics_listen_addr: 127.0.0.1:9090
grpc_listen_addr: 127.0.0.1:50443
grpc_allow_insecure: false

# TS2021 Noise handshake key. A missing key file is auto-generated on first boot into the volume.
noise:
  private_key_path: /var/lib/headscale/noise_private.key

# Tailnet address pool — the canonical Tailscale CGNAT ranges. A node that registers gets a
# 100.64.0.0/10 address, which the gated test asserts as the node's self address.
prefixes:
  v4: 100.64.0.0/10
  v6: fd7a:115c:a1e0::/48
  allocation: sequential

# Embedded DERP enabled: 0.28.0 refuses to start with an empty DERPMap ("initial DERPMap is empty,
# Headscale requires at least one entry"), so the smallest *bootable* config turns on the built-in
# relay region. It works fine over plain http://localhost:8080 — no HTTPS is required for the join +
# netmap flow under test. No external DERP map is fetched (urls/paths empty), so startup makes no
# outbound calls. STUN listens on 3478/udp inside the container (publish it in docker-compose.yml if
# you need NAT traversal; not required just to boot or to register a node).
derp:
  server:
    enabled: true
    region_id: 999
    region_code: headscale
    region_name: Headscale Embedded DERP
    stun_listen_addr: "0.0.0.0:3478"
    private_key_path: /var/lib/headscale/derp_server_private.key
  urls: []
  paths: []
  auto_update_enabled: false
  update_frequency: 24h

# Don't phone home for a headscale version check on startup (offline / ToS-clean).
disable_check_updates: true

# Ephemeral (pre-auth-key) nodes are reaped this long after going offline. Kept short for tests.
ephemeral_node_inactivity_timeout: 30m

database:
  type: sqlite
  sqlite:
    path: /var/lib/headscale/db.sqlite
    write_ahead_log: true

log:
  level: info
  format: text

# File-mode ACL policy with no path = headscale's permissive default (every node can see every
# other) — fine for a single-tailnet test server.
policy:
  mode: file
  path: ""

# DNS off: the daemon under test joins in userspace-networking mode and the tests assert
# registration + a tailnet self address, not DNS. `override_local_dns` MUST be false here — 0.28.0
# defaults it to true, which then REQUIRES a non-empty `nameservers.global` ("dns.nameservers.global
# must be set when dns.override_local_dns is true") and would refuse to boot. With it false (and
# magic_dns off) an empty nameserver list is fine. base_domain must still differ from the server_url
# host, so it is left at the example default.
dns:
  override_local_dns: false
  magic_dns: false
  base_domain: example.com
  nameservers:
    global: []
  search_domains: []

# CLI socket: `headscale users create` / `preauthkeys create` (run via `docker compose exec`) talk
# to the server over this unauthenticated unix socket inside the container.
unix_socket: /var/run/headscale/headscale.sock
unix_socket_permission: "0770"
