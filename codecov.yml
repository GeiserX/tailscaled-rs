codecov:
  require_ci_to_pass: true

coverage:
  precision: 2
  round: down
  range: "70...100"
  status:
    # 90% is the coverage TARGET. The bins currently have little unit coverage,
    # so the project is below 90% today. `informational: true` makes Codecov
    # COMMENT the coverage delta but NOT fail the check — the gate stays
    # non-blocking until coverage is raised (tracked as a separate effort).
    # Flip these back to `informational: false` (or remove the line) to enforce.
    project:
      default:
        target: 90%
        threshold: 2%
        informational: true
    patch:
      default:
        target: 90%
        threshold: 5%
        informational: true

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: true
  require_base: false
  require_head: true

ignore:
  - "target/**"
  - "docs/**"
  - "src/bin/**"
